# 로컬 개발용 내장 DB (Supabase 없이 실행)
spring:
  datasource:
    url: jdbc:h2:file:./data/yonta-dev;MODE=PostgreSQL;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
