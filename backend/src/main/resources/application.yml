spring:
  application:
    name: yonta-backend

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

server:
  port: 8080

admin:
  secret-key: ${ADMIN_SECRET_KEY:yonta-admin-2026}

jwt:
  secret: ${JWT_SECRET:yonta-default-jwt-secret-key-for-development-only}
  access-token-validity: 3600000
  refresh-token-validity: 604800000

logging:
  level:
    com.yonta: DEBUG
    org.hibernate.SQL: DEBUG
